<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data value types in JS</title>
</head>
<body>
    <script>
        // JS data value types
        // primitive - imutable single value data type in js
        // string , number , boolean , undefined , null , symbol and

        // string
        var myName="RANA";
        console.log(myName) ;

        // number
        var myNumber=9988770066 ;
        console.log(myName + " my number is " + myNumber);

        // boolean
        var isMarried=false ;
        console.log(myName + " is married ? " + isMarried);

        // undefined
        var myEmail ;
        console.log(myEmail);
        console.log(typeof(myEmail)) ;

        // null
        var myAddress=null ;
        console.log(myAddress) ;
        console.log(typeof(myAddress)) ;


        var myNum=BigInt(9875543212344566778900998) ;
        console.log(myNum) ;
        console.log(typeof(myNum)) ;

        // symbol
        var var1=Symbol("ARUN");
        var var2=Symbol("ARUN");
        console.log(var1==var2);

        //  reference type(object)-- mutable in memory and keep the data in key value pair

        // object () , function () , array []

        let myInfo={
            name: "Rana" ,
            age: 19,  
            isMarried:false , 
            address: "noida",
            braanch: "CSE",
            section:23
        } ;

        console.log(myInfo);
        console.log(myInfo.name);

        // object length 

        var keys=Object.keys(myInfo);
        console.log(keys.length);

        // function - block of code to perform particular task

        function call(){
            var num1=45;
            var num2=40;
            var add=num1+num2;
            console.log("addition of two number is " + add);
        }
        call();
        

        // array - collection of any data types

        let studentList=["tarunPal" , "tanmay" , "teotia" , "saksham"] ;
        console.log(studentList[0]) ;
        // for different data types
        let student=["Rana" , 23 , false , "noida" , "CSE" , null , 19];
        console.log(student);
        console.log(student.length);

        // to itterate array number
        for(let i=0 ; i<student ; i++){
            console.log(student[1]) ;
        }
        for(let x in student){
            console.log("updated way " + student[x]) ;
        }

    </script>
    
</body>
</html>
