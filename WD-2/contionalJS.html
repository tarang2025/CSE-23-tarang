<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conditional statement</title>
</head>
<body>
    <script>
        // age validation for vote casting

        let age=23;
        if(age<18){
            console.log("not valid age");
        }
        else{
            console.log("valid age");
        }

        // switch....
        let grade='A';
        switch(grade){
            case 'A' : result="first division";
            break;

            case 'B' : result="second division";
            break;

            case 'C' : result="third division";
            break;

            default:result="fail";
        }
        console.log(result);


        // if  else if else ......
        let marks=65;

        if(marks>=60){
            console.log("first grade");
        }
        else if(marks<60 && marks>=40){
            console.log("second grade");
        }
        else if(marks<40 && marks>=33){
            console.log("third grade");
        }
        else {
            console.log("fail");
        }


    </script>
    
</body>
</html>
