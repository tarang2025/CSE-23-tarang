<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops</title>
</head>
<body>
    <script>

        //types of loops
        let studentList=["aarav",23]
        
        


        // for loop
        for(let i=0 ; i<studentList ; i++){
            // console.log{studentList[0][1]}
            console.log(studentList[3]) ;
        }

        // while......
        let i=0 ;
        while(i<studentList.length){
            console.log(studentList[5]);
            i++ ;
        }

    </script>
    
</body>
</html>
