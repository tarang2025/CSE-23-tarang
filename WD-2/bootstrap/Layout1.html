<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <style>
        /* .row {
            border: 2px solid black;

        } */
     </style>
</head>
<body>
    <div class="container">
        <!--header start-->
        <div class="row">
            <div class="row text-centre">
                <h2 >heading</h2>
                <!-- <p class="text-primary">  </p> -->
            </div>
        </div>

        <!--main content-->
        <div class="row box gy-2">
            <!--left-->
            <div class="col-lg-6 bg-info d-flex">
                <!--left 1-->
                <div class="col-lg-6 bg-success">
                    <h2>left 1</h2>

                </div>
            <!--left 1 end-->
        
            <!--left 2-->
            <div class="col-lg-6 bg-warning">
                <h2>left 2</h2>
            </div>
            <!--left 2 end-->
            </div>
            <!--left end-->
            <div class="col-lg-6">
                <div class="col-lg-12 bg-info h-50">
                    <h2>right top</h2>

                </div>

                <div class="col-lg-12 bg-danger h-50">
                    <h2>right bottom</h2>

                </div>
            </div>
        </div>
        <!--main content ends-->
       
        <!--footer-->
        <div class="row box">
            <div class="col-lg-12">
                <p>footer</p>
            </div>
        </div>
        </div>
    </div>
    
</body>
</html>
