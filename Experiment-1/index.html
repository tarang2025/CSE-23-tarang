<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Result Calculator</title>
  <link rel="stylesheet" href="styleex1.css">
</head>
<body>
  <div class="container">
    <h2>Student Result Calculator</h2>

    <label for="subjects">Enter Number of Subjects</label>
    <input type="number" id="subjects" placeholder="Enter Number of Subjects">

    <br><br>

    <button onclick="createMarkInputs()">Enter Marks</button>

    <div id="marksContainer"></div>

    <br>

    <button onclick="calculateResult()">Calculate Result</button>

    <div id="result"></div>
  </div>

  <br><br>
  <p>NAME - NAMAN VAISH</p>
  <p>ADD NO. - 2025B01010011</p>

  <script src="scriptex1.js"></script>
</body>
</html>
